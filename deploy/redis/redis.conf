# Redis Configuration for Delivery App
# Production-ready settings for Celery message broker and cache

# Network
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
loglevel notice
logfile ""

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Security
# requirepass yourpasswordhere  # Uncomment and set password in production
protected-mode no

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Replication (Master mode only)
slaveof no one
slave-read-only yes
repl-diskless-sync no

# Append Only File
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""

# Performance
tcp-backlog 511
databases 16
always-show-logo yes
